name: Playwright Enterprise Suite
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Usamos la versión 22 para alinearnos con tu Mac mini M4 y evitar advertencias
        node-version: 22 
        # Activamos el caché para que el pipeline vuele en ejecuciones futuras
        cache: 'npm'

    - name: 📦 Install dependencies
      # 'npm ci' es el estándar industrial para CI: rápido y respeta el lockfile
      run: npm ci 

    - name: 🎭 Install Playwright Browsers
      # Instalamos solo los binarios necesarios para el sistema operativo del Runner
      run: npx playwright install --with-deps

    - name: 🚀 Run Playwright tests
      # Aquí inyectamos la seguridad y el contexto de ambiente
      run: npx playwright test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        USER_NAME: ${{ secrets.USER_NAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
        ENV: 'qa'
        # El locale ahora es consciente del sistema
        LOCALE: 'en'

    - name: 📊 Upload Test Report
      # Si algo falla, este artefacto es tu única fuente de verdad (Trace Viewer)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        # Asegúrate de que esta ruta coincida con tu playwright.config.ts
        path: playwright-report/ 
        retention-days: 30